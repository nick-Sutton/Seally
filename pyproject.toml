[project]
name = "seally"
version = "0.1.0"
description = "A simple planning library for prototyping "
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "networkx[default]>=3.6.1",
    "numpy>=2.4.3",
    "pandas>=3.0.1",
    "pygame>=2.6.1",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]